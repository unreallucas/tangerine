# Tangerine Lima VM Template
# Boots a Debian VM and runs base-setup.sh to install all tools.

# Debian 13 (Trixie) cloud images
images:
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-arm64-daily.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
    arch: "x86_64"

# Apple Virtualization.framework for better perf on macOS
vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "20GiB"

ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true

# Mount tangerine data — DB, config, credentials survive VM rebuilds.
mounts:
  - location: "~/tangerine"
    mountPoint: "/home/tung.linux/tangerine"
    writable: true
  - location: "~/.config/gh"
    mountPoint: "/home/tung.linux/.config/gh"
    writable: false
  - location: "~/.config/tmux"
    mountPoint: "/home/tung.linux/.config/tmux"
    writable: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      /home/tung.linux/tangerine/base-setup.sh
  - mode: user
    script: |
      #!/bin/bash
      CREDS="/home/tung.linux/tangerine/.credentials"
      if [ -f "$CREDS" ]; then
        . "$CREDS"
        HOST_IP=$(ip route | awk '/default/ {print $3}')

        # GHE proxy + credentials
        git config --global http.https://github.example.com.proxy "socks5://${HOST_IP}:${PROXY_PORT}"
        git config --global credential.https://github.example.com.helper "store --file=/home/tung.linux/tangerine/.git-credentials"
        echo "https://dinhtungdu:${GH_ENTERPRISE_TOKEN}@github.example.com" > /home/tung.linux/tangerine/.git-credentials
        chmod 600 /home/tung.linux/tangerine/.git-credentials

        # Export all credentials to shell
        echo 'set -a' >> ~/.bashrc
        echo '. /home/tung.linux/tangerine/.credentials' >> ~/.bashrc
        echo 'set +a' >> ~/.bashrc
      fi

message: |
  Tangerine VM ready. Next steps:
    1. Clone tangerine repo.
    2. Run: bun install && tangerine start.
