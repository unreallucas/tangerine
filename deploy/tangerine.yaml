# Tangerine Lima VM Template
# Minimal — just boots a Debian VM. Run base-setup.sh via SSH to install tools.

# Debian 13 (Trixie) cloud images
images:
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-arm64-daily.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
    arch: "x86_64"

# Apple Virtualization.framework for better perf on macOS
vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

cpus: 4
memory: "8GiB"
disk: "20GiB"

ssh:
  localPort: 0
  loadDotSSHPubKeys: true
  forwardAgent: true

# Disable Lima auto port-forwarding — Tangerine manages its own tunnels.
portForwards:
  - guestIP: "0.0.0.0"
    guestPortRange: [1, 65535]
    ignore: true
  - guestIP: "127.0.0.1"
    guestPortRange: [1, 65535]
    ignore: true

# Mount tangerine data at guest $HOME/tangerine — DB and config persist across VM rebuilds.
# Lima guest home is /home/<user>.linux — mountPoint must match.
# SSH keys handled by Lima's forwardAgent + loadDotSSHPubKeys.
mounts:
  - location: "~/tangerine"
    mountPoint: "/home/{{.User}}.linux/tangerine"
    writable: true
  - location: "~/.claude"
    mountPoint: "/home/{{.User}}.linux/.claude"
    writable: true
  - location: "~/.config"
    mountPoint: "/home/{{.User}}.linux/.config"
    writable: false

message: |
  Tangerine VM ready. Next steps:
    1. Clone tangerine repo and run: bun install && tangerine start
    2. Run base-setup.sh
