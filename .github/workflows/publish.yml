name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck & lint
        run: bun run check

      - name: Test
        run: bun test

      - name: Build web
        run: bun run build

      - name: Build CLI
        run: bun run build:cli

      - name: Publish to npm
        run: bun publish --access public --ignore-scripts
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
